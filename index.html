<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Boy's Hostel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Parallax Container -->
    <div class="parallax-container">
        <!-- Background Layers -->
        <div class="parallax-layer parallax-layer1"></div>
        <div class="parallax-layer parallax-layer2"></div>
        <div class="parallax-layer parallax-layer3"></div>

        <!-- Cinematic Overlay Content -->
        <div class="parallax-content">
            <h1 class="cinematic-title">Welcome to Lucky Boy's Hostel</h1>
            <p class="cinematic-subtitle">A New World of Comfort and Care</p>
            <a href="javascript:void(0);" class="cta-button" id="registerButton">Register Now</a>
        </div>
    </div>

    <!-- Hidden Registration Section -->
     

    <section id="registration" style="display: none;">
        <h2>Register Now</h2>
        <form action="https://formspree.io/f/xdkognoz" method="POST" id="registrationForm">
            <div>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="mobile">Mobile Number:</label>
                <input type="tel" id="mobile" name="mobile" required>
            </div>
            <div>
                <label for="purpose">Purpose (Student/Job):</label>
                <input type="text" id="purpose" name="purpose" required>
            </div>

            <!-- Payment Section with Highlighted Style -->
            <div class="payment-section">
                <label for="payment">Payment Option:</label>
                <select id="payment" name="payment" required>
                    <option value="daywise">Daywise (₹299 per day)</option>
                    <option value="monthlywise">Monthlywise (₹3999 per month)</option>
                </select>
            </div>

            <button type="submit">Submit Registration</button>
        </form>
    </section>

    <footer>
        <p>Contact Us: 9381467119 | Email: <a href="mailto:prashanthimaroju143@gmail.com">prashanthimaroju143@gmail.com</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
